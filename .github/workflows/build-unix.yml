name: Build

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  create-draft:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
    - name: Create draft release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
          echo "release $GITHUB_REF_NAME already exists; reusing it"
        else
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --draft --generate-notes --title "tri-pp $GITHUB_REF_NAME"
        fi

  build:
    needs: create-draft
    # run even when create-draft is skipped (non-tag pushes and pull requests)
    if: always() && (needs.create-draft.result == 'success' || !startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds run inside a pinned container whose toolchain matches
          # the per-arch LLVM prebuilt (see Dockerfile for why the base
          # differs); macOS builds natively with Apple clang. Intel macOS has
          # no native LLVM 18.1.8 package and is not built.
          - os: ubuntu-22.04
            asset: tri-pp-linux-x64
            mode: docker
            base: ubuntu:18.04
            archcheck: x86-64
          - os: ubuntu-24.04-arm
            asset: tri-pp-linux-arm64
            mode: docker
            base: ubuntu:22.04
            archcheck: aarch64
          - os: macos-15
            asset: tri-pp-macos-arm64
            mode: native
            archcheck: arm64

    steps:
    - uses: actions/checkout@v6

    - name: Build (Linux, in pinned container)
      if: matrix.mode == 'docker'
      run: |
        docker build --build-arg BASE=${{ matrix.base }} -t tri-pp-build .
        docker run --rm -v "$PWD":/build-zone tri-pp-build /bin/bash -c "chmod +x mk && ./mk"
        cp build/tri-pp "${{ matrix.asset }}"

    - name: Build (macOS, native)
      if: matrix.mode == 'native'
      run: |
        brew list cmake >/dev/null 2>&1 || brew install cmake
        brew list zstd >/dev/null 2>&1 || brew install zstd
        ./mk
        cp tri-pp "${{ matrix.asset }}"

    - name: Verify architecture
      run: file "${{ matrix.asset }}" | grep -iq "${{ matrix.archcheck }}"

    - name: Run tests
      run: |
        export TRI_CMD="$PWD/${{ matrix.asset }}"
        ./tests/runalldirs

    - name: Checksum
      if: startsWith(github.ref, 'refs/tags/')
      run: shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

    - name: Upload to draft release
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
          --clobber "${{ matrix.asset }}" "${{ matrix.asset }}.sha256"

    # Make binaries downloadable from every workflow run
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset }}
        path: ${{ matrix.asset }}
