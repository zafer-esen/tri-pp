name: Build

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds run inside the pinned Ubuntu 18.04 image (see
          # Dockerfile for why); macOS builds natively with Apple clang.
          # Intel macOS has no native LLVM 18.1.8 package and is not built.
          - os: ubuntu-22.04
            asset: tri-pp-linux-x64
            mode: docker
            archcheck: x86-64
          - os: ubuntu-24.04-arm
            asset: tri-pp-linux-arm64
            mode: docker
            archcheck: aarch64
          - os: macos-15
            asset: tri-pp-macos-arm64
            mode: native
            archcheck: arm64

    steps:
    - uses: actions/checkout@v6

    - name: Build (Linux, in Ubuntu 18.04 container)
      if: matrix.mode == 'docker'
      run: |
        docker build -t tri-pp-build .
        docker run --rm -v "$PWD":/build-zone tri-pp-build /bin/bash -c "chmod +x mk && ./mk"
        cp build/tri-pp "${{ matrix.asset }}"

    - name: Build (macOS, native)
      if: matrix.mode == 'native'
      run: |
        brew list cmake >/dev/null 2>&1 || brew install cmake
        ./mk
        cp tri-pp "${{ matrix.asset }}"

    - name: Verify architecture
      run: file "${{ matrix.asset }}" | grep -iq "${{ matrix.archcheck }}"

    - name: Run tests
      run: |
        export TRI_CMD="$PWD/${{ matrix.asset }}"
        ./tests/runalldirs

    - name: Checksum
      if: startsWith(github.ref, 'refs/tags/')
      run: shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ matrix.asset }}
          ${{ matrix.asset }}.sha256
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Make binaries downloadable from every workflow run
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset }}
        path: ${{ matrix.asset }}
